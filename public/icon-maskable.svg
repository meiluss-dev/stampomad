<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable icon: safe zone is inner 80% (51.2px padding each side) -->
  <rect width="512" height="512" fill="#0f1419"/>

  <!-- Outer stamp circle (within safe zone) -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#c9a96e" stroke-width="6" opacity="0.9"/>
  <!-- Inner stamp circle (dashed) -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#c9a96e" stroke-width="2.5" opacity="0.5" stroke-dasharray="10 7"/>

  <!-- Airplane (rotated slightly for dynamism) -->
  <g transform="translate(256,250) rotate(-20)" fill="#c9a96e">
    <path d="M-9,-60 L9,-60 L9,-16 L55,14 L55,26 L9,10 L9,38 L25,50 L25,58 L0,47 L-25,58 L-25,50 L-9,38 L-9,10 L-55,26 L-55,14 L-9,-16 Z"/>
  </g>

  <!-- Curved text — STAMPOMAD at top -->
  <defs>
    <path id="top-arc-m" d="M 90,256 a 166,166 0 1,1 332,0"/>
    <path id="bottom-arc-m" d="M 422,256 a 166,166 0 1,1 -332,0"/>
  </defs>
  <text font-size="30" font-weight="700" letter-spacing="12" fill="#c9a96e" font-family="Georgia, serif" opacity="0.85">
    <textPath href="#top-arc-m" startOffset="50%" text-anchor="middle">STAMPOMAD</textPath>
  </text>
  <text font-size="20" font-weight="400" letter-spacing="6" fill="#c9a96e" font-family="Georgia, serif" opacity="0.55">
    <textPath href="#bottom-arc-m" startOffset="50%" text-anchor="middle">TRAVEL TRACKER</textPath>
  </text>

  <!-- Decorative dots -->
  <circle cx="90" cy="256" r="5" fill="#c9a96e" opacity="0.5"/>
  <circle cx="422" cy="256" r="5" fill="#c9a96e" opacity="0.5"/>
</svg>
