<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="100" fill="#0f1419"/>

  <!-- Outer stamp circle -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#c9a96e" stroke-width="8" opacity="0.9"/>
  <!-- Inner stamp circle (dashed) -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#c9a96e" stroke-width="3" opacity="0.5" stroke-dasharray="12 8"/>

  <!-- Airplane (rotated slightly for dynamism) -->
  <g transform="translate(256,250) rotate(-20)" fill="#c9a96e">
    <path d="M-10,-68 L10,-68 L10,-18 L62,16 L62,30 L10,12 L10,44 L28,58 L28,66 L0,54 L-28,66 L-28,58 L-10,44 L-10,12 L-62,30 L-62,16 L-10,-18 Z"/>
  </g>

  <!-- Curved text — STAMPOMAD at top -->
  <defs>
    <path id="top-arc" d="M 66,256 a 190,190 0 1,1 380,0"/>
    <path id="bottom-arc" d="M 446,256 a 190,190 0 1,1 -380,0"/>
  </defs>
  <text font-size="36" font-weight="700" letter-spacing="14" fill="#c9a96e" font-family="Georgia, serif" opacity="0.85">
    <textPath href="#top-arc" startOffset="50%" text-anchor="middle">STAMPOMAD</textPath>
  </text>
  <text font-size="24" font-weight="400" letter-spacing="8" fill="#c9a96e" font-family="Georgia, serif" opacity="0.55">
    <textPath href="#bottom-arc" startOffset="50%" text-anchor="middle">TRAVEL TRACKER</textPath>
  </text>

  <!-- Decorative dots at 3 and 9 o'clock -->
  <circle cx="66" cy="256" r="6" fill="#c9a96e" opacity="0.5"/>
  <circle cx="446" cy="256" r="6" fill="#c9a96e" opacity="0.5"/>
</svg>
