<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="40" fill="#0f1419"/>

  <!-- Outer stamp circle -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="#c9a96e" stroke-width="4" opacity="0.9"/>
  <!-- Inner stamp circle (dashed) -->
  <circle cx="96" cy="96" r="62" fill="none" stroke="#c9a96e" stroke-width="1.5" opacity="0.5" stroke-dasharray="5 4"/>

  <!-- Airplane (rotated slightly for dynamism) -->
  <g transform="translate(96,94) rotate(-20)" fill="#c9a96e">
    <path d="M-3.5,-24 L3.5,-24 L3.5,-6 L22,6 L22,11 L3.5,4 L3.5,16 L10,21 L10,24 L0,20 L-10,24 L-10,21 L-3.5,16 L-3.5,4 L-22,11 L-22,6 L-3.5,-6 Z"/>
  </g>

  <!-- Curved text — STAMPOMAD at top -->
  <defs>
    <path id="top-arc" d="M 26,96 a 70,70 0 1,1 140,0"/>
    <path id="bottom-arc" d="M 166,96 a 70,70 0 1,1 -140,0"/>
  </defs>
  <text font-size="13" font-weight="700" letter-spacing="5" fill="#c9a96e" font-family="Georgia, serif" opacity="0.85">
    <textPath href="#top-arc" startOffset="50%" text-anchor="middle">STAMPOMAD</textPath>
  </text>
  <text font-size="9" font-weight="400" letter-spacing="3" fill="#c9a96e" font-family="Georgia, serif" opacity="0.55">
    <textPath href="#bottom-arc" startOffset="50%" text-anchor="middle">TRAVEL TRACKER</textPath>
  </text>

  <!-- Decorative dots at 3 and 9 o'clock -->
  <circle cx="26" cy="96" r="2.5" fill="#c9a96e" opacity="0.5"/>
  <circle cx="166" cy="96" r="2.5" fill="#c9a96e" opacity="0.5"/>
</svg>
